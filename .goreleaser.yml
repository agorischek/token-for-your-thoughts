version: 2

before:
  hooks:
    - go test -short ./...

builds:
  - id: tfyt
    main: ./cmd/tfyt
    binary: tfyt
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE*
      - tfyt.schema.json
      - src: examples/.tfyt.example.json
        dst: .tfyt.example.json
      - src: examples/.tfyt.example.toml
        dst: .tfyt.example.toml
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: agorischek
    name: token-for-your-thoughts
